name: account_service_test

services:
  postgres_test:
    # latest inspected on 2026-04-13 -> app version 18.3.0
    image: bitnami/postgresql@sha256:155a5ff04d5059d8076a85dca404d8a3bc2d765db0fea1afd25ae68e9ac38903
    container_name: qqtang_phase19_pg_test
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: qqtang_test
      POSTGRESQL_PASSWORD: qqtang_test_pass
      POSTGRESQL_DATABASE: qqtang_account_test
    ports:
      - "54330:5432"
    volumes:
      - qqtang_phase19_pgtestdata:/bitnami/postgresql

volumes:
  qqtang_phase19_pgtestdata:
