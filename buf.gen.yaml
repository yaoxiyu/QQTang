version: v2
plugins:
  - local: protoc-gen-go
    out: services/room_service/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go
    out: services/game_service/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: services/room_service/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: services/game_service/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-csharp
    out: network/client_net/generated/proto/qqt/room/v1
