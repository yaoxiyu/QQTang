name: qqtang_phase24_test

services:
  account_postgres_test:
    image: bitnami/postgresql@sha256:155a5ff04d5059d8076a85dca404d8a3bc2d765db0fea1afd25ae68e9ac38903
    environment:
      POSTGRESQL_USERNAME: qqtang_test
      POSTGRESQL_PASSWORD: qqtang_test_pass
      POSTGRESQL_DATABASE: qqtang_account_test
    ports:
      - "54330:5432"
    volumes:
      - account_pgdata_test:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qqtang_test -d qqtang_account_test -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  game_postgres_test:
    image: bitnami/postgresql@sha256:155a5ff04d5059d8076a85dca404d8a3bc2d765db0fea1afd25ae68e9ac38903
    environment:
      POSTGRESQL_USERNAME: qqtang_game_test
      POSTGRESQL_PASSWORD: qqtang_game_test_pass
      POSTGRESQL_DATABASE: qqtang_game_test
    ports:
      - "54332:5432"
    volumes:
      - game_pgdata_test:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qqtang_game_test -d qqtang_game_test -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  ds_manager_service:
    build:
      context: ../../
      dockerfile: services/ds_manager_service/Dockerfile
    environment:
      DSM_HTTP_ADDR: 0.0.0.0:18090
      DSM_INTERNAL_AUTH_KEY_ID: primary
      DSM_INTERNAL_AUTH_SHARED_SECRET: phase24_test_internal_shared_secret
      DSM_GODOT_EXECUTABLE: godot4
      DSM_PROJECT_ROOT: /workspace
      DSM_BATTLE_SCENE_PATH: res://scenes/network/dedicated_server_scene.tscn
      DSM_BATTLE_TICKET_SECRET: phase24_test_battle_ticket_secret
      DSM_BATTLE_LOG_DIR: /tmp/qqt_battle_logs_test
      DSM_DS_HOST: 127.0.0.1
      DSM_PORT_RANGE_START: 19110
      DSM_PORT_RANGE_END: 19180
    ports:
      - "28090:18090"

  game_service:
    build:
      context: ../../
      dockerfile: services/game_service/Dockerfile
    environment:
      GAME_HTTP_ADDR: 0.0.0.0:18081
      GAME_GRPC_ADDR: 0.0.0.0:19081
      GAME_POSTGRES_DSN: postgres://qqtang_game_test:qqtang_game_test_pass@game_postgres_test:5432/qqtang_game_test?sslmode=disable
      GAME_JWT_SHARED_SECRET: phase24_test_game_jwt_secret
      GAME_INTERNAL_AUTH_KEY_ID: primary
      GAME_INTERNAL_AUTH_SHARED_SECRET: phase24_test_internal_shared_secret
      GAME_DS_MANAGER_URL: http://ds_manager_service:18090
      GAME_DEFAULT_DS_HOST: ds_manager_service
      GAME_DEFAULT_DS_PORT: 19110
      GAME_LOG_SQL: "false"
    depends_on:
      game_postgres_test:
        condition: service_healthy
      ds_manager_service:
        condition: service_healthy
    ports:
      - "28081:18081"
      - "29081:19081"

  account_service:
    build:
      context: ../../
      dockerfile: services/account_service/Dockerfile
    environment:
      ACCOUNT_HTTP_LISTEN_ADDR: 0.0.0.0:18080
      ACCOUNT_POSTGRES_DSN: postgres://qqtang_test:qqtang_test_pass@account_postgres_test:5432/qqtang_account_test?sslmode=disable
      ACCOUNT_TOKEN_SIGN_SECRET: phase24_test_account_access_secret
      ACCOUNT_ROOM_TICKET_SIGN_SECRET: phase24_test_room_ticket_secret
      ACCOUNT_GAME_SERVICE_BASE_URL: http://game_service:18081
      ACCOUNT_GAME_INTERNAL_AUTH_KEY_ID: primary
      ACCOUNT_GAME_INTERNAL_AUTH_SHARED_SECRET: phase24_test_internal_shared_secret
      ACCOUNT_LOG_SQL: "false"
    depends_on:
      account_postgres_test:
        condition: service_healthy
      game_service:
        condition: service_healthy
    ports:
      - "28080:18080"

  room_service:
    build:
      context: ../../
      dockerfile: services/room_service/Dockerfile
    environment:
      ROOM_HTTP_ADDR: 0.0.0.0:19100
      ROOM_WS_ADDR: 0.0.0.0:9100
      ROOM_DEFAULT_PORT: 9100
      ROOM_TICKET_SECRET: phase24_test_room_ticket_secret
      ROOM_MANIFEST_PATH: /app/build/generated/room_manifest/room_manifest.json
      ROOM_GAME_SERVICE_GRPC_ADDR: game_service:19081
      ROOM_LOG_LEVEL: info
      ROOM_SHARD_ID: room-shard-test-01
      ROOM_INSTANCE_ID: room-instance-test-01
    depends_on:
      game_service:
        condition: service_healthy
    ports:
      - "29100:19100"
      - "29101:9100"

volumes:
  account_pgdata_test:
  game_pgdata_test:
