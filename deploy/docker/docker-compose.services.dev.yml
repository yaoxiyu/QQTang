name: qqtang_services_dev

services:
  # DEV ONLY:
  # ds_manager_service needs docker.sock for local warm-pool experiments.
  # Never reuse this compose file as-is in production.
  ds_manager_service:
    build:
      context: ../../
      dockerfile: services/ds_manager_service/Dockerfile
    user: "0:0"
    environment:
      DSM_HTTP_ADDR: 0.0.0.0:18090
      DSM_ENV: development
      DSM_INTERNAL_AUTH_KEY_ID: primary
      DSM_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      DSM_POOL_MODE: docker_warm_pool
      DSM_POOL_ID: qqtang_services_dev
      DSM_POOL_MIN_READY: ${QQT_DSM_POOL_MIN_READY:-1}
      DSM_POOL_MAX_SIZE: ${QQT_DSM_POOL_MAX_SIZE:-4}
      DSM_POOL_PREFILL_BATCH: ${QQT_DSM_POOL_PREFILL_BATCH:-1}
      DSM_POOL_RECONCILE_INTERVAL_SEC: 5
      DSM_ALLOCATE_WAIT_READY_TIMEOUT_MS: ${QQT_DSM_READY_TIMEOUT_MS:-30000}
      DSM_DOCKER_SOCKET: unix:///var/run/docker.sock
      DSM_DS_IMAGE: ${QQT_BATTLE_DS_IMAGE:-qqtang/battle-ds:dev}
      DSM_DS_NETWORK: qqtang_services_dev_default
      DSM_DS_CONTAINER_PREFIX: qqt-ds
      DSM_DS_ADVERTISE_MODE: public_host_port
      DSM_DS_PUBLIC_HOST: 127.0.0.1
      DSM_DS_HOST_PORT_RANGE_START: ${QQT_DSM_DS_HOST_PORT_RANGE_START:-20000}
      DSM_DS_HOST_PORT_RANGE_END: ${QQT_DSM_DS_HOST_PORT_RANGE_END:-20020}
      DSM_DS_AGENT_PORT: 19090
      DSM_DS_BATTLE_PORT: 9000
      DSM_DS_AGENT_INTERNAL_AUTH_KEY_ID: primary
      DSM_DS_AGENT_INTERNAL_AUTH_SECRET: services_internal_shared_secret
      DSM_BATTLE_TICKET_SECRET: dev_battle_ticket_secret
      QQT_ALLOW_INSECURE_HTTP: "1"
      DSM_GAME_SERVICE_BASE_URL: http://game_service:18081
      DSM_BASE_URL: http://ds_manager_service:18090
      DSM_BATTLE_LOG_DIR: /tmp/qqt_battle_logs
      DSM_PORT_RANGE_START: ${QQT_DSM_PORT_RANGE_START:-19010}
      DSM_PORT_RANGE_END: ${QQT_DSM_PORT_RANGE_END:-19050}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18090:18090"

  game_service:
    build:
      context: ../../
      dockerfile: services/game_service/Dockerfile
    environment:
      GAME_HTTP_ADDR: 0.0.0.0:18081
      GAME_ENV: development
      GAME_GRPC_ADDR: 0.0.0.0:19081
      GAME_POSTGRES_DSN: postgres://qqtang_game:qqtang_game_dev_pass@host.docker.internal:54331/qqtang_game_dev?sslmode=disable
      GAME_ROOM_MANIFEST_PATH: /app/build/generated/room_manifest/room_manifest.json
      GAME_JWT_SHARED_SECRET: services_game_jwt_secret
      GAME_INTERNAL_AUTH_KEY_ID: primary
      GAME_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      GAME_DS_MANAGER_URL: http://ds_manager_service:18090
      GAME_DEFAULT_DS_HOST: ds_manager_service
      GAME_DEFAULT_DS_PORT: ${QQT_DSM_PORT_RANGE_START:-19010}
      GAME_LOG_SQL: ${QQT_LOG_SQL:-false}
    depends_on:
      ds_manager_service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18081:18081"
      - "19081:19081"

  account_service:
    build:
      context: ../../
      dockerfile: services/account_service/Dockerfile
    environment:
      ACCOUNT_HTTP_LISTEN_ADDR: 0.0.0.0:18080
      ACCOUNT_ENV: development
      ACCOUNT_POSTGRES_DSN: postgres://qqtang:qqtang_dev_pass@host.docker.internal:54329/qqtang_account_dev?sslmode=disable
      ACCOUNT_TOKEN_SIGN_SECRET: services_account_access_secret
      ACCOUNT_ROOM_TICKET_SIGN_SECRET: services_room_ticket_secret
      ACCOUNT_BATTLE_TICKET_SIGN_SECRET: dev_battle_ticket_secret
      ACCOUNT_GAME_SERVICE_BASE_URL: http://game_service:18081
      ACCOUNT_GAME_INTERNAL_AUTH_KEY_ID: primary
      ACCOUNT_GAME_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      ACCOUNT_LOG_SQL: ${QQT_LOG_SQL:-false}
    depends_on:
      game_service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18080:18080"

  room_service:
    build:
      context: ../../
      dockerfile: services/room_service/Dockerfile
    environment:
      ROOM_HTTP_ADDR: 0.0.0.0:19100
      ROOM_ENV: development
      ROOM_WS_ADDR: 0.0.0.0:9100
      ROOM_DEFAULT_PORT: 9100
      ROOM_TICKET_SECRET: services_room_ticket_secret
      ROOM_MANIFEST_PATH: /app/build/generated/room_manifest/room_manifest.json
      ROOM_GAME_SERVICE_GRPC_ADDR: game_service:19081
      ROOM_GAME_SERVICE_BASE_URL: http://game_service:18081
      ROOM_GAME_INTERNAL_AUTH_KEY_ID: primary
      ROOM_GAME_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      ROOM_EMPTY_BATTLE_CLEANUP_GRACE_SECONDS: 30
      ROOM_LOG_LEVEL: info
      ROOM_SHARD_ID: room-shard-dev-01
      ROOM_INSTANCE_ID: room-instance-dev-01
      ROOM_DEPLOYMENT_MODE: single_instance
      ROOM_EXPECTED_REPLICAS: 1
    depends_on:
      game_service:
        condition: service_healthy
    ports:
      - "19100:19100"
      - "9100:9100"
