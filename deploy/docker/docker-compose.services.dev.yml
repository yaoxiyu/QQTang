name: qqtang_services_dev

services:
  ds_manager_service:
    build:
      context: ../../
      dockerfile: services/ds_manager_service/Dockerfile
    environment:
      DSM_HTTP_ADDR: 0.0.0.0:18090
      DSM_INTERNAL_AUTH_KEY_ID: primary
      DSM_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      DSM_GODOT_EXECUTABLE: ${QQT_DSM_GODOT_EXECUTABLE:-godot4}
      DSM_PROJECT_ROOT: /workspace
      DSM_BATTLE_SCENE_PATH: res://scenes/network/dedicated_server_scene.tscn
      DSM_BATTLE_TICKET_SECRET: services_battle_ticket_secret
      DSM_BATTLE_LOG_DIR: /tmp/qqt_battle_logs
      DSM_DS_HOST: 127.0.0.1
      DSM_PORT_RANGE_START: ${QQT_DSM_PORT_RANGE_START:-19010}
      DSM_PORT_RANGE_END: ${QQT_DSM_PORT_RANGE_END:-19050}
    ports:
      - "18090:18090"

  game_service:
    build:
      context: ../../
      dockerfile: services/game_service/Dockerfile
    environment:
      GAME_HTTP_ADDR: 0.0.0.0:18081
      GAME_GRPC_ADDR: 0.0.0.0:19081
      GAME_POSTGRES_DSN: postgres://qqtang_game:qqtang_game_dev_pass@host.docker.internal:54331/qqtang_game_dev?sslmode=disable
      GAME_ROOM_MANIFEST_PATH: /app/build/generated/room_manifest/room_manifest.json
      GAME_JWT_SHARED_SECRET: services_game_jwt_secret
      GAME_INTERNAL_AUTH_KEY_ID: primary
      GAME_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      GAME_DS_MANAGER_URL: http://ds_manager_service:18090
      GAME_DEFAULT_DS_HOST: ds_manager_service
      GAME_DEFAULT_DS_PORT: ${QQT_DSM_PORT_RANGE_START:-19010}
      GAME_LOG_SQL: ${QQT_LOG_SQL:-false}
    depends_on:
      ds_manager_service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18081:18081"
      - "19081:19081"

  account_service:
    build:
      context: ../../
      dockerfile: services/account_service/Dockerfile
    environment:
      ACCOUNT_HTTP_LISTEN_ADDR: 0.0.0.0:18080
      ACCOUNT_POSTGRES_DSN: postgres://qqtang:qqtang_dev_pass@host.docker.internal:54329/qqtang_account_dev?sslmode=disable
      ACCOUNT_TOKEN_SIGN_SECRET: services_account_access_secret
      ACCOUNT_ROOM_TICKET_SIGN_SECRET: services_room_ticket_secret
      ACCOUNT_GAME_SERVICE_BASE_URL: http://game_service:18081
      ACCOUNT_GAME_INTERNAL_AUTH_KEY_ID: primary
      ACCOUNT_GAME_INTERNAL_AUTH_SHARED_SECRET: services_internal_shared_secret
      ACCOUNT_LOG_SQL: ${QQT_LOG_SQL:-false}
    depends_on:
      game_service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18080:18080"

  room_service:
    build:
      context: ../../
      dockerfile: services/room_service/Dockerfile
    environment:
      ROOM_HTTP_ADDR: 0.0.0.0:19100
      ROOM_WS_ADDR: 0.0.0.0:9100
      ROOM_DEFAULT_PORT: 9100
      ROOM_TICKET_SECRET: services_room_ticket_secret
      ROOM_MANIFEST_PATH: /app/build/generated/room_manifest/room_manifest.json
      ROOM_GAME_SERVICE_GRPC_ADDR: game_service:19081
      ROOM_LOG_LEVEL: info
      ROOM_SHARD_ID: room-shard-dev-01
      ROOM_INSTANCE_ID: room-instance-dev-01
    depends_on:
      game_service:
        condition: service_healthy
    ports:
      - "19100:19100"
      - "9100:9100"
