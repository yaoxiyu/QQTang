syntax = "proto3";

package qqt.internal.game.v1;

option go_package = "qqt/proto/qqt/internal/game/v1;gamev1";

message RoomContext {
  string room_id = 1;
  string room_kind = 2;
  string assignment_id = 3;
  string room_instance_id = 4;
  string room_shard_id = 5;
}

message PartyMember {
  string account_id = 1;
  string profile_id = 2;
  int32 team_id = 3;
  string character_id = 4;
  string character_skin_id = 5;
  string bubble_style_id = 6;
  string bubble_skin_id = 7;
}

message EnterPartyQueueRequest {
  RoomContext context = 1;
  string queue_type = 2;
  string match_format_id = 3;
  repeated string selected_mode_ids = 4;
  repeated PartyMember members = 5;
}

message EnterPartyQueueResponse {
  bool ok = 1;
  string queue_entry_id = 2;
  string queue_state = 3;
  string error_code = 4;
  string user_message = 5;
  string queue_phase = 6;
  string queue_terminal_reason = 7;
  string queue_status_text = 8;
}

message CancelPartyQueueRequest {
  RoomContext context = 1;
  string queue_entry_id = 2;
}

message CancelPartyQueueResponse {
  bool ok = 1;
  string queue_state = 2;
  string error_code = 3;
  string user_message = 4;
  string queue_phase = 5;
  string queue_terminal_reason = 6;
  string queue_status_text = 7;
}

message GetPartyQueueStatusRequest {
  RoomContext context = 1;
  string queue_entry_id = 2;
}

message GetPartyQueueStatusResponse {
  bool ok = 1;
  string queue_state = 2;
  string assignment_id = 3;
  string match_id = 4;
  string battle_id = 5;
  string server_host = 6;
  int32 server_port = 7;
  string error_code = 8;
  string user_message = 9;
  string queue_phase = 10;
  string queue_terminal_reason = 11;
  string queue_status_text = 12;
  string assignment_status_text = 13;
  string allocation_phase = 14;
  string allocation_reason = 15;
  bool battle_entry_ready = 16;
  int32 assignment_revision = 17;
}

message CreateManualRoomBattleRequest {
  RoomContext context = 1;
  string mode_id = 2;
  string rule_set_id = 3;
  string map_id = 4;
  repeated PartyMember members = 5;
}

message CreateManualRoomBattleResponse {
  bool ok = 1;
  string assignment_id = 2;
  string match_id = 3;
  string battle_id = 4;
  string server_host = 5;
  int32 server_port = 6;
  string error_code = 7;
  string user_message = 8;
  int32 assignment_revision = 9;
}

message CommitAssignmentReadyRequest {
  RoomContext context = 1;
  string assignment_id = 2;
  string match_id = 3;
  string battle_id = 4;
  string account_id = 5;
  string profile_id = 6;
  int32 assignment_revision = 7;
}

message CommitAssignmentReadyResponse {
  bool ok = 1;
  string committed_state = 2;
  string error_code = 3;
  string user_message = 4;
}

message GetBattleAssignmentStatusRequest {
  string room_id = 1;
  string room_kind = 2;
  string assignment_id = 3;
  int64 known_revision = 4;
}

message GetBattleAssignmentStatusResponse {
  bool ok = 1;
  string error_code = 2;
  string user_message = 3;

  string room_id = 10;
  string assignment_id = 11;
  int64 assignment_revision = 12;

  string match_id = 20;
  string battle_id = 21;
  string server_host = 22;
  int32 server_port = 23;

  string battle_phase = 30;
  string terminal_reason = 31;
  string allocation_state = 32;
  string status_text = 33;

  bool battle_entry_ready = 40;
  bool finalized = 41;
}

service RoomControlService {
  rpc EnterPartyQueue(EnterPartyQueueRequest) returns (EnterPartyQueueResponse);
  rpc CancelPartyQueue(CancelPartyQueueRequest) returns (CancelPartyQueueResponse);
  rpc GetPartyQueueStatus(GetPartyQueueStatusRequest) returns (GetPartyQueueStatusResponse);
  rpc GetBattleAssignmentStatus(GetBattleAssignmentStatusRequest) returns (GetBattleAssignmentStatusResponse);
  rpc CreateManualRoomBattle(CreateManualRoomBattleRequest) returns (CreateManualRoomBattleResponse);
  rpc CommitAssignmentReady(CommitAssignmentReadyRequest) returns (CommitAssignmentReadyResponse);
}
