name: validate

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validation:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install Godot Mono
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '4.6.2'
          $archive = "Godot_v${version}-stable_mono_win64.zip"
          $url = "https://github.com/godotengine/godot/releases/download/${version}-stable/$archive"
          $destRoot = Join-Path $env:RUNNER_TEMP 'godot'
          $zipPath = Join-Path $destRoot $archive
          New-Item -ItemType Directory -Path $destRoot -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $destRoot -Force
          # Search for the executable in the extracted files
          $exePath = Get-ChildItem -Path $destRoot -Filter "Godot*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) {
            throw "Godot executable not found in $destRoot"
          }
          "GODOT_EXE=$exePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Validation
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/validation/run_validation.ps1 -GodotExe "$env:GODOT_EXE" -ProjectPath "$env:GITHUB_WORKSPACE"

      - name: Upload Validation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            tests/reports/latest/validation_latest.txt
            tests/reports/latest/validation_latest.json
            tests/reports/latest/cross_service_contract_suite_latest.txt
            tests/reports/latest/cross_service_contract_suite_latest.json

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan sensitive log patterns
        run: |
          set -euo pipefail
          patterns=(
            'ticket_debug'
            'secret_sha256'
            'expected_sig='
            'provided_sig='
          )
          regex=$(IFS='|'; echo "${patterns[*]}")
          hits=$(rg -n --no-heading --color never \
            -g '*.go' -g '*.gd' \
            -g '!**/*_test.go' \
            -g '!**/test/**' \
            -g '!**/tests/**' \
            -g '!**/docs/**' \
            -g '!**/generated/**' \
            "$regex" \
            app/ network/ services/ || true)
          if [ -n "$hits" ]; then
            echo "[security] sensitive log pattern detected:"
            echo "$hits"
            exit 1
          fi
          echo "[security] no sensitive log patterns detected."

  linux-native-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install native build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Install Godot Mono
        shell: bash
        run: |
          set -euo pipefail
          version="4.6.2"
          archive="Godot_v${version}-stable_mono_linux_x86_64.zip"
          url="https://github.com/godotengine/godot/releases/download/${version}-stable/${archive}"
          dest_root="${RUNNER_TEMP}/godot"
          zip_path="${dest_root}/${archive}"
          mkdir -p "${dest_root}"
          curl -L "${url}" -o "${zip_path}"
          unzip -q "${zip_path}" -d "${dest_root}"
          godot_bin="$(find "${dest_root}" -type f -name 'Godot*linux*.x86_64' | head -n 1)"
          if [[ -z "${godot_bin}" ]]; then
            echo "Godot Linux executable not found in ${dest_root}" >&2
            exit 1
          fi
          chmod +x "${godot_bin}"
          echo "GODOT_BIN=${godot_bin}" >> "${GITHUB_ENV}"

      - name: Check Linux native runtime
        shell: bash
        run: |
          chmod +x tools/native/build_native_linux.sh tools/native/check_native_runtime_linux.sh
          GODOT_BIN="${GODOT_BIN}" ./tools/native/check_native_runtime_linux.sh
