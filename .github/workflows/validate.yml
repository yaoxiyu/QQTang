name: validate

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validation:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install Godot Mono
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '4.6.2'
          $archive = "Godot_v${version}-stable_mono_win64.zip"
          $url = "https://github.com/godotengine/godot/releases/download/${version}-stable/$archive"
          $destRoot = Join-Path $env:RUNNER_TEMP 'godot'
          $zipPath = Join-Path $destRoot $archive
          New-Item -ItemType Directory -Path $destRoot -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $destRoot -Force
          # Search for the executable in the extracted files
          $exePath = Get-ChildItem -Path $destRoot -Filter "Godot*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) {
            throw "Godot executable not found in $destRoot"
          }
          "GODOT_EXE=$exePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Validation
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/validation/run_validation.ps1 -GodotExe "$env:GODOT_EXE" -ProjectPath "$env:GITHUB_WORKSPACE"

      - name: Upload Validation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            tests/reports/latest/validation_latest.txt
            tests/reports/latest/validation_latest.json
            tests/reports/latest/cross_service_contract_suite_latest.txt
            tests/reports/latest/cross_service_contract_suite_latest.json
